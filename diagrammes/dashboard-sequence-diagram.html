<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagramme de séquence - Raycasting AXEL</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #ffffff;
        color: #0f172a;
      }

      .page {
        max-width: 1700px;
        margin: 24px auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 18px;
        color: #334155;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin: 0 0 18px;
        flex-wrap: wrap;
      }

      .toolbar button {
        border: 1px solid #93c5fd;
        background: #dbeafe;
        color: #1e3a8a;
        border-radius: 10px;
        padding: 10px 14px;
        font: 600 14px "Segoe UI", Arial, sans-serif;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
      }

      .toolbar button:hover {
        background: #bfdbfe;
        transform: translateY(-1px);
      }

      .panel {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 18px;
        box-shadow: none;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Diagramme de séquence du raycasting</h1>
      <p>
        Version fidèle au flux réel du projet : interaction 3D, propagation
        de la commande, publication ROS et mise à jour du jumeau numérique.
      </p>
      <div class="toolbar">
        <button id="download-svg-btn" type="button">Télécharger SVG</button>
        <button id="download-png-btn" type="button">Télécharger PNG</button>
      </div>
      <div class="panel">
        <div id="diagram"></div>
      </div>
    </div>

    <script src="./dashboard-sequence-diagram.js"></script>
  </body>
</html>
