<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Diagramme Cas d'Utilisation — AXEL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; }
    h2 { font-size: 16px; color: #333; margin-bottom: 16px; font-weight: 600; }
    #diagram { background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 12px; }
    .btns { margin-top: 18px; display: flex; gap: 12px; }
    button {
      padding: 10px 28px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 700; transition: background .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-svg { background: #2563eb; color: #fff; }
    .btn-svg:hover { background: #1d4ed8; }
    .btn-png { background: #16a34a; color: #fff; box-shadow: 0 2px 8px rgba(22,163,74,.3); }
    .btn-png:hover { background: #15803d; }
  </style>
</head>
<body>
  <h2>Diagramme de Cas d'Utilisation Global — Système Robot AXEL</h2>
  <div id="diagram"></div>
  <div class="btns">
    <button class="btn-svg" onclick="downloadSvgUsecase()">⬇ Télécharger SVG</button>
    <button class="btn-png" onclick="downloadPngUsecase()">⬇ Télécharger PNG</button>
  </div>
  <script src="dashboard-usecase-diagram.js"></script>
  <script>
    buildUsecaseDiagram(document.getElementById("diagram"));
  </script>
</body>
</html>
